<!DOCTYPE html>
<html>

<head>

<title>Apply | V JOIN Educational Consultancy</title>

<meta name="description" content="Apply for study abroad programs through V JOIN Educational Consultancy.">

<link rel="stylesheet" href="style.css">

</head>

<body>
<script>
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("leadForm").addEventListener("submit", function(e){
        e.preventDefault();

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        fetch("YOUR_URL", {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const message = `New Lead:%0A
Name: ${data.name}%0A
Phone: ${data.phone}%0A
Country: ${data.country}%0A
Course: ${data.course}`;

        window.open(`https://wa.me/917994685101?text=${message}`, "_blank");

        alert("Application submitted successfully!");
    });
});
</script>

<section class="section">

<h2>Student Application Form</h2>

<form id="leadForm">
<input type="text" name="name" placeholder="Full Name" required>
<input type="text" name="phone" placeholder="Phone Number" required>
<input type="email" name="email" placeholder="Email" required>

<select name="country">
<option>Malaysia</option>
<option>UK</option>
<option>Australia</option>
<option>Canada</option>
</select>

<input type="text" name="course" placeholder="Preferred Course">

<textarea name="message" placeholder="Message"></textarea>

<button type="submit">Submit</button>
</form>
